<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<title>华仔の温暖小站 💕</title>
<style>
/* ===== RESET & VARS ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#F9D0C3;--cream:#F5E6D3;--gold:#F0E6D8;--deep-pink:#E8A0B4;
  --brown:#8B6F5E;--dark:#4A3728;--white:#FFFBF7;
  --card-shadow:0 4px 20px rgba(139,111,94,0.12);--radius:20px;
  --font-main:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
}
html{font-size:16px;overflow:hidden;height:100%}
body{
  font-family:var(--font-main);background:linear-gradient(180deg,#FDF2EC 0%,#F5E6D3 50%,#FDF2EC 100%);
  background-attachment:fixed;height:100vh;color:var(--dark);
  display:flex;flex-direction:column;overflow:hidden;
  -webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;
}
#app{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 70px;-webkit-overflow-scrolling:touch}

/* ===== PAGES ===== */
.page{display:none;padding:16px 16px 24px;max-width:600px;margin:0 auto}
.page.active{display:block}

/* ===== HERO ===== */
.hero{text-align:center;padding:30px 16px 10px}
.hero-hearts{font-size:1.3rem;letter-spacing:6px;animation:floatHearts 3s ease-in-out infinite}
.hero-title{font-size:1.7rem;font-weight:700;color:var(--brown);letter-spacing:2px;font-family:Georgia,"STSong",serif;margin:6px 0}
.hero-subtitle{font-size:0.9rem;color:#A0897B;font-style:italic}
@keyframes floatHearts{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ===== CARDS ===== */
.card{
  background:rgba(255,255,255,0.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:var(--radius);box-shadow:0 4px 20px rgba(139,111,94,0.08);padding:20px;margin:12px 0
}
.card-title{font-size:1rem;color:var(--brown);font-weight:600;margin-bottom:12px;text-align:center}

/* ===== BOTTOM NAV ===== */
.nav-bar{
  position:fixed;bottom:0;left:0;right:0;height:64px;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;justify-content:space-around;align-items:center;
  border-top:1px solid rgba(0,0,0,0.06);z-index:500;padding-bottom:env(safe-area-inset-bottom,0)
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;
  cursor:pointer;font-size:0.68rem;color:#B8A090;transition:color 0.2s;-webkit-tap-highlight-color:transparent
}
.nav-item.active{color:#E8486B}
.nav-icon{font-size:1.4rem}
.nav-badge{position:absolute;top:0;right:-4px;background:#E8486B;color:white;font-size:0.6rem;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.nav-badge-hidden{display:none}

/* ===== MUYU ===== */
.muyu-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0}
.muyu-stand{position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.muyu-cushion{width:150px;height:24px;background:radial-gradient(ellipse at center,#D4A98A 0%,#9B6B4A 100%);border-radius:50%;margin-bottom:-8px;z-index:1}
.muyu-body{width:120px;height:120px;background:radial-gradient(circle at 45% 40%,#E0B878 0%,#C4854A 35%,#9B5F35 100%);border-radius:50%;position:relative;box-shadow:0 8px 30px rgba(139,87,48,0.35),inset 0 -5px 10px rgba(0,0,0,0.15),inset 0 3px 6px rgba(255,255,255,0.1);transition:transform 0.08s ease-out;z-index:2}
.muyu-body:active,.muyu-body.pressed{transform:scale(0.9) translateY(8px);box-shadow:0 2px 8px rgba(139,87,48,0.3),inset 0 -2px 4px rgba(0,0,0,0.2);transition:transform 0.05s ease-out}
.muyu-groove{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:50px;height:6px;background:rgba(0,0,0,0.16);border-radius:3px}
.muyu-fish{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:24px;background:rgba(0,0,0,0.06);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;display:flex;align-items:center;justify-content:center}
.muyu-fish::after{content:'🐟';font-size:13px;opacity:0.4}
.muyu-amount{font-size:2.6rem;font-weight:700;color:var(--brown);margin-top:12px;font-family:Georgia,serif}
.muyu-amount.bump{animation:amountBump 0.35s ease-out}
.muyu-hint{font-size:0.78rem;color:#C0A894;margin-top:6px}
@keyframes amountBump{0%{transform:scale(1)}25%{transform:scale(1.25);color:var(--deep-pink)}100%{transform:scale(1)}}

/* ===== WHEEL ===== */
.wheel-wrap{position:relative;width:280px;height:280px;margin:0 auto}
.wheel-pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:1.6rem;color:#E8486B;z-index:10;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.2));animation:pointerBounce 1s ease-in-out infinite}
@keyframes pointerBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(4px)}}
#wheelCanvas{display:block;width:280px;height:280px;border-radius:50%}
.wheel-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;border:3px solid #FFF;background:linear-gradient(135deg,#FF6B8A,#E8486B);color:white;font-size:1.2rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(232,72,107,0.4);z-index:5;transition:transform 0.1s}
.wheel-btn:active{transform:translate(-50%,-50%) scale(0.88)}
.wheel-btn:disabled{opacity:0.5;pointer-events:none}
.wheel-counter{text-align:center;color:#B0A090;font-size:0.82rem;margin-top:10px}

/* ===== VOUCHERS ===== */
.voucher-card{
  background:linear-gradient(135deg,#FFFDF5,#FFF8E1);border:2px dashed #E8D5A0;
  border-radius:12px;padding:16px;margin-bottom:10px;position:relative;display:flex;align-items:center;gap:14px
}
.voucher-icon{font-size:2.2rem}
.voucher-info{flex:1}
.voucher-name{font-weight:700;color:var(--brown);font-size:0.95rem}
.voucher-time{font-size:0.7rem;color:#B8A090;margin-top:2px}
.voucher-detail{font-size:0.75rem;color:#C0392B;margin-top:4px}
.voucher-empty{text-align:center;color:#C8B4A4;padding:30px 0;font-size:0.9rem}

/* ===== BOTTLE PAGE ===== */
.bottle-scene{position:relative;width:100%;height:360px;border-radius:16px;overflow:hidden;margin-bottom:14px}
.scene-sky{position:absolute;top:0;left:0;right:0;height:55%;background:linear-gradient(180deg,#87CEEB 0%,#B5DFF5 100%)}
.scene-sun{position:absolute;top:15px;right:25px;width:42px;height:42px;background:radial-gradient(circle,#FFF3C4,#FFD166 50%,#F0A030 100%);border-radius:50%;box-shadow:0 0 30px rgba(255,209,102,0.5);animation:sunGlow 3s ease-in-out infinite}
@keyframes sunGlow{0%,100%{box-shadow:0 0 25px rgba(255,209,102,0.4)}50%{box-shadow:0 0 45px rgba(255,209,102,0.7)}}
.scene-cloud{position:absolute;background:white;border-radius:50px;opacity:0.85}
.scene-cloud::before,.scene-cloud::after{content:'';position:absolute;background:white;border-radius:50%}
.c1{width:65px;height:20px;top:20px;left:10%;animation:cloudDrift 22s linear infinite}
.c1::before{width:28px;height:28px;top:-14px;left:12px}.c1::after{width:20px;height:20px;top:-8px;left:36px}
.c2{width:50px;height:15px;top:50px;left:60%;animation:cloudDrift 26s linear infinite;animation-delay:-8s}
.c2::before{width:22px;height:22px;top:-11px;left:8px}.c2::after{width:15px;height:15px;top:-7px;left:26px}
.c3{width:55px;height:18px;top:60px;left:80%;animation:cloudDrift 20s linear infinite;animation-delay:-14s}
.c3::before{width:25px;height:25px;top:-13px;left:10px}.c3::after{width:17px;height:17px;top:-8px;left:32px}
@keyframes cloudDrift{0%{transform:translateX(0)}100%{transform:translateX(-120px)}}
.scene-sea{position:absolute;bottom:0;left:0;right:0;height:48%;background:linear-gradient(180deg,#5BADD5 0%,#3D8FBF 30%,#1B5E8A 100%)}
.scene-wave{position:absolute;left:-5%;width:110%;border-radius:40%;opacity:0.45}
.w1{top:0;height:35px;background:rgba(110,190,230,0.5);animation:waveRoll 3.5s ease-in-out infinite}
.w2{top:12px;height:40px;background:rgba(80,160,210,0.45);animation:waveRoll 4.5s ease-in-out infinite reverse}
.w3{top:26px;height:45px;background:rgba(50,130,190,0.4);animation:waveRoll 5.5s ease-in-out infinite}
@keyframes waveRoll{0%,100%{transform:translateX(-3%) rotate(0deg)}25%{transform:translateX(3%) rotate(1deg)}50%{transform:translateX(-2%) rotate(0deg)}75%{transform:translateX(2%) rotate(-1deg)}}

/* 海上漂流瓶 */
.floating-bottles{position:absolute;bottom:35%;left:0;right:0;height:40%;z-index:10}
.float-bottle{position:absolute;font-size:2rem;cursor:pointer;animation:bobFloat 3s ease-in-out infinite;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.2))}
.float-bottle:nth-child(1){left:15%;animation-delay:0s;animation-duration:3.2s}
.float-bottle:nth-child(2){left:40%;animation-delay:-0.8s;animation-duration:3.6s}
.float-bottle:nth-child(3){left:65%;animation-delay:-1.6s;animation-duration:2.8s}
.float-bottle:nth-child(4){left:80%;animation-delay:-2.4s;animation-duration:3.4s}
.float-bottle-label{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:0.55rem;background:rgba(0,0,0,0.6);color:white;padding:1px 6px;border-radius:8px;white-space:nowrap}
@keyframes bobFloat{0%,100%{transform:translateY(0) rotate(-3deg)}25%{transform:translateY(-8px) rotate(2deg)}50%{transform:translateY(0) rotate(-2deg)}75%{transform:translateY(6px) rotate(4deg)}}

/* 写烦恼区 */
.worry-textarea{width:100%;min-height:100px;border:2px solid #E8D5B0;border-radius:12px;padding:14px;font-size:0.95rem;font-family:"STKaiti","KaiTi",serif;color:var(--dark);resize:vertical;outline:none;background:#FFFEF9;line-height:1.8}
.worry-textarea:focus{border-color:var(--deep-pink)}
.worry-actions{display:flex;gap:10px;margin-top:10px}
.btn{padding:10px 20px;border:none;border-radius:25px;font-size:0.9rem;cursor:pointer;font-family:var(--font-main);transition:transform 0.15s}
.btn:active{transform:scale(0.96)}
.btn-primary{background:linear-gradient(135deg,#5B9BD5,#3B7DC4);color:white;flex:1}
.btn-pink{background:linear-gradient(135deg,#E8A0B4,#D4889A);color:white}

/* 历史瓶子列表 */
.bottle-history-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.bottle-tag{display:flex;align-items:center;gap:4px;background:#FFFEF9;border:1px solid #E8D5B0;border-radius:20px;padding:6px 14px;cursor:pointer;font-size:0.82rem;transition:transform 0.15s}
.bottle-tag:active{transform:scale(0.95)}
.bottle-tag.has-reply{border-color:#5B9BD5;background:#F0F7FD}

/* ===== REPLY ===== */
.reply-badge{display:inline-block;background:#E8486B;color:white;width:6px;height:6px;border-radius:50%;margin-left:2px}

/* ===== QUOTE ===== */
.quote-card{text-align:center;padding:18px 16px;background:linear-gradient(135deg,#FFF7F2,#FFEFE6);border-radius:14px;border:1px solid rgba(232,160,180,0.2);cursor:pointer;min-height:70px;display:flex;flex-direction:column;justify-content:center}
.quote-text{font-size:1.05rem;color:var(--brown);line-height:1.8;font-family:Georgia,"STSong",serif;transition:opacity 0.3s}
.quote-text.fade{opacity:0}
.quote-hint{font-size:0.7rem;color:#C8B4A4;margin-top:8px}

/* ===== PHOTO ===== */
.photo-mini{display:flex;gap:8px;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch}
.photo-mini img{width:100px;height:100px;border-radius:12px;object-fit:cover;flex-shrink:0;cursor:pointer;transition:transform 0.2s}
.photo-mini img:active{transform:scale(0.95)}

/* ===== MODALS ===== */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--white);border-radius:var(--radius);padding:28px 22px;max-width:350px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.2);animation:modalIn 0.3s ease-out}
@keyframes modalIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
.modal-btn{margin-top:12px;padding:10px 28px;border:none;border-radius:25px;background:var(--deep-pink);color:white;font-size:0.95rem;cursor:pointer;font-family:var(--font-main)}
.modal-btn:active{transform:scale(0.95)}
.modal-btn-row{display:flex;gap:10px;justify-content:center;margin-top:14px}

/* ===== BOTTLE OPEN (letter) ===== */
.letter-paper{background:linear-gradient(180deg,#FFFEF9 0%,#FFF9E8 100%);border:1px solid #D4C5A0;border-radius:4px;padding:24px 20px;font-family:"STKaiti","KaiTi",serif;color:var(--dark);line-height:2;text-align:left;max-height:50vh;overflow-y:auto;position:relative}
.letter-date{text-align:right;color:#B8A090;font-size:0.8rem;margin-bottom:10px}
.letter-body{white-space:pre-wrap;word-break:break-word}
.letter-reply{border-top:1px dashed #E8D5B0;margin-top:14px;padding-top:14px;color:#3B7DC4}
.letter-reply-label{font-size:0.8rem;color:#5B9BD5;margin-bottom:4px}

/* ===== ADMIN ===== */
.admin-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:2000;justify-content:center;align-items:center}
.admin-overlay.active{display:flex}
.admin-panel{background:var(--white);border-radius:var(--radius);width:92%;max-width:440px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.25);animation:modalIn 0.3s ease-out}
.admin-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #F0E6D8;position:sticky;top:0;background:var(--white);z-index:1;border-radius:var(--radius) var(--radius) 0 0}
.admin-close{background:none;border:none;font-size:1.3rem;color:#A0897B;cursor:pointer}
.admin-body{padding:14px 18px 22px}
.admin-stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F5E6D3;font-size:0.85rem}
.admin-stat-label{color:#A0897B}.admin-stat-value{color:var(--brown);font-weight:600}
.admin-title{font-size:0.92rem;color:var(--brown);font-weight:600;margin:14px 0 6px}
.admin-btn{display:block;width:100%;margin-top:8px;padding:10px;border:none;border-radius:18px;font-size:0.85rem;cursor:pointer;font-family:var(--font-main)}
.admin-btn-info{background:#EAF0FB;color:#2C5282}
.admin-btn-danger{background:#FFE8E8;color:#C0392B}

/* ===== TOAST ===== */
.toast{position:fixed;top:16%;left:50%;transform:translateX(-50%);background:rgba(74,55,40,0.9);color:#FFFBF7;padding:12px 24px;border-radius:28px;font-size:0.95rem;z-index:3000;animation:toastIn 0.4s ease-out,toastOut 0.4s 2.4s ease-in forwards;pointer-events:none;max-width:90vw;text-align:center}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}

/* ===== PARTICLES ===== */
.ptcls{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999}

/* ===== REPLY FEEDBACK MODAL ===== */
.feedback-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1500;justify-content:center;align-items:center}
.feedback-modal.active{display:flex}
</style>
</head>
<body>

<div class="ptcls" id="ptcls"></div>
<div id="app"></div>

<!-- NAV BAR -->
<nav class="nav-bar" id="navBar">
  <div class="nav-item active" data-page="home"><span class="nav-icon">🏠</span>首页</div>
  <div class="nav-item" data-page="muyu"><span class="nav-icon">🪵</span>木鱼</div>
  <div class="nav-item" data-page="wheel"><span class="nav-icon">🎡</span>转盘</div>
  <div class="nav-item" data-page="bottle"><span class="nav-icon">🍾</span>漂流瓶</div>
  <div class="nav-item" data-page="vouchers"><span class="nav-icon">🎫</span>券包</div>
</nav>

<!-- ===== MODALS ===== -->
<!-- 转盘结果 -->
<div class="modal-overlay" id="wheelResultModal">
  <div class="modal-box"><div id="wheelResultContent"></div><button class="modal-btn" id="wheelResultClose">好的 👌</button></div>
</div>
<!-- 照片放大 -->
<div class="modal-overlay" id="photoModal"><img id="photoLarge" style="max-width:92vw;max-height:80vh;border-radius:14px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,0.3)" alt="photo"/></div>
<!-- 信件打开 -->
<div class="modal-overlay" id="letterModal"><div class="modal-box" style="max-width:380px;padding:0;background:transparent;box-shadow:none"><div id="letterContent"></div><button class="modal-btn" style="margin:10px auto;display:block" id="letterClose">关上信封 ✉️</button></div></div>
<!-- 是否需要反馈弹窗 -->
<div class="modal-overlay" id="feedbackModal"><div class="modal-box">
  <div style="font-size:1.1rem;color:var(--brown);margin-bottom:8px">💌 需要华仔的回复吗？</div>
  <div style="font-size:0.85rem;color:#A0897B;margin-bottom:4px">华仔会读到你的烦恼并给你回应</div>
  <div class="modal-btn-row">
    <button class="modal-btn" id="feedbackYes" style="background:#3B7DC4">需要 💕</button>
    <button class="modal-btn" id="feedbackNo" style="background:#C0B0A0">不用啦</button>
  </div>
</div></div>
<!-- 管理面板 -->
<div class="admin-overlay" id="adminOverlay"><div class="admin-panel"><div class="admin-header"><h2>🔒 管理面板</h2><button class="admin-close" id="adminClose">✕</button></div><div class="admin-body" id="adminBody"></div></div></div>
<!-- 密码弹窗 -->
<div class="modal-overlay" id="pwdOverlay"><div class="modal-box">
  <div style="font-size:1.2rem;margin-bottom:12px;color:var(--brown)">🔐 验证身份</div>
  <input type="password" id="pwdInput" placeholder="请输入密码" style="width:100%;padding:12px;border:2px solid #F9D0C3;border-radius:25px;font-size:1rem;text-align:center;outline:none;margin-bottom:12px;font-family:var(--font-main)">
  <div><button class="modal-btn" id="pwdCancel" style="background:#C0B0A0">取消</button><button class="modal-btn" id="pwdConfirm" style="margin-left:8px;background:var(--brown)">确认</button></div>
</div></div>

<script>
// ======================================================================
//  CORE
// ======================================================================
const W = {
  PWD: 'HhxloveCwh1314!',
  store: {
    get(k, fb) { try { const v = localStorage.getItem('warm_'+k); return v!==null ? JSON.parse(v) : fb; } catch(e) { return fb; } },
    set(k, v) { try { localStorage.setItem('warm_'+k, JSON.stringify(v)); } catch(e) {} }
  },
  init() {
    ['muyu_count','muyu_total','wheel_count','wheel_records','wheel_milestones','vouchers','bottle_history','bottle_replies'].forEach(k => {
      if (this.store.get(k, null) === null) {
        const defaults = { muyu_count:0, muyu_total:0, wheel_count:0, wheel_records:[], wheel_milestones:{m52:false,m520:false,m1314:false}, vouchers:[], bottle_history:[], bottle_replies:{} };
        this.store.set(k, defaults[k]);
      }
    });
  },
  toast(msg) {
    const e = document.querySelector('.toast'); if(e) e.remove();
    const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
    document.body.appendChild(t); setTimeout(() => t.remove(), 2900);
  },
  spawn(x, y, text, n) {
    const c = document.getElementById('ptcls');
    for (let i = 0; i < n; i++) {
      const p = document.createElement('div');
      p.textContent = text;
      p.style.cssText = `position:fixed;left:${x}px;top:${y}px;font-size:${12+Math.random()*12}px;pointer-events:none;z-index:999;--dx:${(Math.random()-0.5)*70}px;animation:ptcl ${0.5+Math.random()*0.5}s ease-out forwards`;
      c.appendChild(p); setTimeout(() => p.remove(), 1100);
    }
  },
  fmtDate(iso) { const d=new Date(iso); return d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); },
  fmtDateShort(iso) { const d=new Date(iso); return (d.getMonth()+1)+'.'+d.getDate(); },

(function initMuyu() {
  let count = W.store.get('muyu_count', 0);
  let total = W.store.get('muyu_total', 0);
  const body = document.getElementById('muyuBody');
  const amt = document.getElementById('muyuAmount');
  let audioCtx = null;

  amt.textContent = '¥' + total.toFixed(1);

  const stand = document.getElementById('muyuStand');
  stand.addEventListener('pointerdown', e => { e.preventDefault(); body.classList.add('pressed'); hit(e); });
  stand.addEventListener('pointerup', () => body.classList.remove('pressed'));
  stand.addEventListener('pointerleave', () => body.classList.remove('pressed'));

  function hit(e) {
    count++; total = parseFloat((total + 0.1).toFixed(1));
    W.store.set('muyu_count', count); W.store.set('muyu_total', total);

    // audio
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const ctx = audioCtx, t = ctx.currentTime;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.setValueAtTime(220, t); o.frequency.exponentialRampToValueAtTime(90, t+0.1);
      g.gain.setValueAtTime(0.35, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.22);
      o.start(t); o.stop(t+0.22);
    } catch(_) {}

    if (navigator.vibrate) navigator.vibrate(12);
    amt.textContent = '¥' + total.toFixed(1);
    amt.classList.remove('bump'); void amt.offsetWidth; amt.classList.add('bump');

    const r = body.getBoundingClientRect();
    W.spawn(r.left+r.width/2, r.top+5, '+0.1', 3);
    W.spawn(r.left+r.width*0.7, r.top, '💛', 2);

    // easter egg
    const sp = {'5.2':'💝 5.20！我爱你','13.1':'💖 13.14！一生一世','52.0':'💗 52.0！吾爱零'};
    if (sp[total.toFixed(1)]) { setTimeout(() => { W.toast(sp[total.toFixed(1)]); W.spawn(window.innerWidth/2, window.innerHeight/2, '🎉', 15); }, 350); }
  }
})();

(function initWheel() {
  const prizes = [
    { name:'谢谢惠顾',icon:'😅',prob:0.42,level:0 },
    { name:'华仔亲亲',icon:'😘',prob:0.25,level:0 },
    { name:'爱的抱抱',icon:'🫂',prob:0.16,level:0 },
    { name:'请喝奶茶',icon:'🧋',prob:0.09,level:1 },
    { name:'请吃饭',icon:'🍽️',prob:0.04,level:2 },
    { name:'买束花花',icon:'💐',prob:0.025,level:2 },
    { name:'买Jellycat',icon:'🧸',prob:0.01,level:3 },
    { name:'买包包/戒指',icon:'💍',prob:0.005,level:3 },
  ];
  const colors = ['#FFE6DA','#FFF7F0','#FFE0D0','#FFFBF7','#FFECD8','#FFF4EC','#FFE2CE','#FFFAF6'];
  let spinning = false, curAngle = 0;
  let count = W.store.get('wheel_count', 0);
  let records = W.store.get('wheel_records', []);
  let ms = W.store.get('wheel_milestones', {});
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const btn = document.getElementById('wheelBtn');
  const counter = document.getElementById('wheelCounter');
  counter.textContent = '已转 ' + count + ' 次';

  function draw(angle) {
    const a = angle || 0, cx = 140, cy = 140, r = 130;
    ctx.clearRect(0, 0, 280, 280);
    ctx.beginPath(); ctx.arc(cx, cy, r+3, 0, 2*Math.PI); ctx.fillStyle='rgba(139,111,94,0.12)'; ctx.fill();
    const sa = 2*Math.PI/prizes.length;
    for (let i = 0; i < prizes.length; i++) {
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, i*sa+a, (i+1)*sa+a); ctx.closePath();
      ctx.fillStyle = colors[i]; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2; ctx.stroke();
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(i*sa+a+sa/2);
      ctx.textAlign='center'; ctx.fillStyle='#4A3728';
      ctx.font='bold 15px sans-serif'; ctx.fillText(prizes[i].icon, r*0.6, 4);
      ctx.font='10px sans-serif'; ctx.fillText(prizes[i].name, r*0.6, 20);
      ctx.restore();
    }
    ctx.beginPath(); ctx.arc(cx, cy, 34, 0, 2*Math.PI);
    const cg = ctx.createRadialGradient(cx, cy, 3, cx, cy, 34);
    cg.addColorStop(0,'#FFFBF7'); cg.addColorStop(1,'#F0E6D8'); ctx.fillStyle=cg; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=3; ctx.stroke();
  }
  draw(0);

  function adjustProbs() {
    const p = prizes.map(x => ({...x}));
    const c = count;
    if (!ms.m52 && c >= 45) { const b = Math.min(0.4, 0.04+(c-45)*0.07); p[4].prob=b; p[0].prob=Math.max(0.05,p[0].prob-(b-0.04)); }
    if (!ms.m520 && c >= 500) { const b = Math.min(0.3, 0.025+(c-500)*0.018); p[6].prob=b; p[0].prob=Math.max(0.05,p[0].prob-(b-0.025)); }
    if (!ms.m1314 && c >= 1290) { const b = Math.min(0.25, 0.005+(c-1290)*0.015); p[7].prob=b; p[0].prob=Math.max(0.05,p[0].prob-(b-0.005)); }
    return p;
  }

  function pick() {
    const ap = adjustProbs(); let r = Math.random();
    for (let i = 0; i < ap.length; i++) { r -= ap[i].prob; if (r <= 0) return {idx:i, pr:ap[i]}; }
    return {idx:0, pr:ap[0]};
  }

  btn.addEventListener('click', () => {
    if (spinning) return;
    spinning = true; btn.disabled = true; count++; W.store.set('wheel_count', count);
    const {idx, pr} = pick();
    const slice = 360/prizes.length;
    const targetCenter = idx*slice + slice/2;
    const extra = 4+Math.floor(Math.random()*3);
    const totalDeg = extra*360 + ((270-targetCenter) - ((curAngle%360)+360)%360);
    const startA = curAngle;
    const duration = 3800+Math.random()*1200;
    const t0 = performance.now();

    function anim(now) {
      const p = Math.min((now-t0)/duration, 1);
      const e = 1-Math.pow(1-p, 3);
      curAngle = startA + totalDeg*e;
      draw(curAngle*Math.PI/180);
      if (p<1) requestAnimationFrame(anim);
      else {
        curAngle = startA+totalDeg; draw(curAngle*Math.PI/180);
        counter.textContent = '已转 '+count+' 次';
        onResult(pr);
      }
    }
    requestAnimationFrame(anim);
  });

  function onResult(pr) {
    records.push({time:new Date().toISOString(), prize:pr.name, icon:pr.icon, level:pr.level});
    W.store.set('wheel_records', records);
    if (pr.level>=1 && !ms.m52 && count>=45) { ms.m52=true; W.store.set('wheel_milestones', ms); }
    if (pr.level>=2 && !ms.m520 && count>=500) { ms.m520=true; W.store.set('wheel_milestones', ms); }
    if (pr.level>=3 && !ms.m1314 && count>=1290) { ms.m1314=true; W.store.set('wheel_milestones', ms); }

    // create voucher for level >= 1 prizes
    if (pr.level >= 1) {
      const vouchers = W.store.get('vouchers', []);
      vouchers.push({prize:pr.name, icon:pr.icon, time:new Date().toISOString(), used:false});
      W.store.set('vouchers', vouchers);
    }

    showResultModal(pr);
    if (pr.level>=2) setTimeout(() => { W.spawn(window.innerWidth/2, window.innerHeight/2, '🎉', 20); }, 400);

    setTimeout(() => { if (!document.getElementById('wheelResultModal').classList.contains('active')) { spinning=false; btn.disabled=false; } }, 400);
  }

  function showResultModal(pr) {
    const msg = pr.level>=3?'💎 超级大奖！！':pr.level>=2?'🎊 恭喜！大奖来啦！':pr.level>=1?'🎫 已加入券包！':'下次会更好～';
    document.getElementById('wheelResultContent').innerHTML = `<div style="font-size:3rem;margin-bottom:6px">${pr.icon}</div><div style="font-size:1.3rem;font-weight:700;color:#4A3728">${pr.name}</div><div style="color:#A0897B;font-size:0.82rem;margin-top:6px">${msg}${pr.level>=1?'<br><span style="color:#E8486B;font-size:0.72rem">去「券包」查看，可兑换红包 💰</span>':''}</div>`;
    document.getElementById('wheelResultModal').classList.add('active');
    document.getElementById('wheelResultClose').onclick = () => {
      document.getElementById('wheelResultModal').classList.remove('active'); spinning=false; btn.disabled=false;
    };
  }
})();

(function initAdmin() {
  const title = document.getElementById('heroTitle');
  let timer;
  title.addEventListener('pointerdown', () => { timer = setTimeout(() => { document.getElementById('pwdInput').value=''; document.getElementById('pwdOverlay').classList.add('active'); }, 3000); });
  title.addEventListener('pointerup', () => clearTimeout(timer));
  title.addEventListener('pointerleave', () => clearTimeout(timer));
  title.addEventListener('touchmove', () => clearTimeout(timer));

  document.getElementById('pwdConfirm').addEventListener('click', verify);
  document.getElementById('pwdCancel').addEventListener('click', () => document.getElementById('pwdOverlay').classList.remove('active'));
  document.getElementById('pwdInput').addEventListener('keydown', e => { if(e.key==='Enter') verify(); });
  document.getElementById('adminClose').addEventListener('click', () => document.getElementById('adminOverlay').classList.remove('active'));

  function verify() {
    if (document.getElementById('pwdInput').value === W.PWD) {
      document.getElementById('pwdOverlay').classList.remove('active'); show();
    } else { W.toast('密码错误 ❌'); document.getElementById('pwdInput').value=''; }
  }

  function show() {
    const mc=W.store.get('muyu_count',0), mt=W.store.get('muyu_total',0), wc=W.store.get('wheel_count',0);
    const records=W.store.get('wheel_records',[]), ms=W.store.get('wheel_milestones',{});
    const pc={}; records.forEach(r=>{pc[r.prize]=(pc[r.prize]||0)+1;});
    const body=document.getElementById('adminBody');
    body.innerHTML=`
      <div class="admin-title">📊 木鱼统计</div>
      <div class="admin-stat"><span class="admin-stat-label">总敲击</span><span class="admin-stat-value">${mc} 次</span></div>
      <div class="admin-stat"><span class="admin-stat-label">累计金额</span><span class="admin-stat-value">¥${mt.toFixed(1)}</span></div>
      <div class="admin-title">🎡 转盘统计</div>
      <div class="admin-stat"><span class="admin-stat-label">总转动</span><span class="admin-stat-value">${wc} 次</span></div>
      <div class="admin-stat"><span class="admin-stat-label">吃饭里程碑(~52)</span><span class="admin-stat-value">${ms.m52?'✅已触发':'⏳未触发('+wc+'/~52)'}</span></div>
      <div class="admin-stat"><span class="admin-stat-label">Jellycat(~520)</span><span class="admin-stat-value">${ms.m520?'✅已触发':'⏳未触发('+wc+'/~520)'}</span></div>
      <div class="admin-stat"><span class="admin-stat-label">戒指/包包(~1314)</span><span class="admin-stat-value">${ms.m1314?'✅已触发':'⏳未触发('+wc+'/~1314)'}</span></div>
      <div class="admin-title">🏆 中奖统计</div>
      ${[{name:'谢谢惠顾',icon:'😅'},{name:'华仔亲亲',icon:'😘'},{name:'爱的抱抱',icon:'🫂'},{name:'请喝奶茶',icon:'🧋'},{name:'请吃饭',icon:'🍽️'},{name:'买束花花',icon:'💐'},{name:'买Jellycat',icon:'🧸'},{name:'买包包/戒指',icon:'💍'}].map(p=>`<div class="admin-stat"><span class="admin-stat-label">${p.icon} ${p.name}</span><span class="admin-stat-value">${pc[p.name]||0} 次</span></div>`).join('')}
      <div class="admin-title">💌 待回复的漂流瓶</div>
      <div id="adminPendingReplies"><div style="color:#A0897B;text-align:center;padding:8px">加载中...</div></div>
      <div class="admin-title">📋 最近记录</div>
      <div style="max-height:200px;overflow-y:auto;font-size:0.8rem">${records.slice().reverse().slice(0,50).map(r=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #F5E6D3"><span style="color:var(--brown);font-weight:500">${r.icon} ${r.prize}</span><span style="color:#A0897B">${W.fmtDate(r.time)}</span></div>`).join('')||'<div style="color:#A0897B;text-align:center;padding:10px">暂无</div>'}</div>

      <button class="admin-btn admin-btn-danger" id="adminReset">⚠️ 重置所有数据</button>
    `;
    document.getElementById('adminRefresh').onclick=show;
    document.getElementById('adminEmail').onclick=()=>{
      try { emailjs.send('service_5kb3qjr','template_qswaff3',{message:`📊 每日统计\n\n🪵 木鱼: ${mc}次, ¥${mt.toFixed(1)}\n🎡 转盘: ${wc}次\n\n中奖明细:\n${Object.entries(pc).map(([k,v])=>k+': '+v+'次').join('\n')}\n\n华仔查看时间: ${new Date().toLocaleString('zh-CN')}`,time:new Date().toLocaleString('zh-CN'),from:'📊 每日统计报告'}); } catch(_) {}

    document.getElementById('adminReset').onclick=()=>{
      if(confirm('确定重置所有数据？')){if(confirm('再次确认？')){['muyu_count','muyu_total','wheel_count','wheel_records','wheel_milestones','vouchers','bottle_history','bottle_replies','quotes_index'].forEach(k=>{const d={wheel_milestones:{m52:false,m520:false,m1314:false},wheel_records:[],vouchers:[],bottle_history:[],bottle_replies:{}};W.store.set(k,d[k]!==undefined?d[k]:0);});show();location.reload();}}
    };
    document.getElementById('adminOverlay').classList.add('active');
  }
})();

// ======================================================================
//  DAILY STATS AUTO-SEND (once per day when page opens)
// ======================================================================
(function initDailyStats() {
  const lastSent = W.store.get('last_stats_sent_date', '');
  const today = new Date().toISOString().slice(0, 10);
  if (lastSent !== today) {
    // Try to send daily stats on first open of the day
    setTimeout(() => {
      const mc=W.store.get('muyu_count',0), mt=W.store.get('muyu_total',0), wc=W.store.get('wheel_count',0);
      const records=W.store.get('wheel_records',[]);
      const pc={}; records.forEach(r=>{pc[r.prize]=(pc[r.prize]||0)+1;});
      try {
        emailjs.send('service_5kb3qjr','template_qswaff3',{
          message: `📊 每日自动统计 [${today}]\n\n🪵 木鱼敲击: ${mc} 次\n💰 累计金额: ¥${mt.toFixed(1)}\n🎡 转盘: ${wc} 次\n\n🏆 中奖明细:\n${Object.entries(pc).map(([k,v])=>k+': '+v+'次').join('\n')}`,
          time: new Date().toLocaleString('zh-CN'),
          from: '📊 每日自动统计'
        });
        W.store.set('last_stats_sent_date', today);
      } catch(_) {}
    }, 5000); // delay 5s to load all data
  }
})();

// Listen for replies from Firebase (auto-sync to her phone)
(function initReplyListener() {
  if (!window.firebaseDB) return;
  window.firebaseDB.ref('replies').on('value', snapshot => {
    const data = snapshot.val();
    if (data) {
      W.store.set('bottle_replies', data);
      // re-render UI
      try { initBottleReRender(); } catch(_) {}
    }
  });

  // Initial load
  window.firebaseDB.ref('replies').once('value').then(snapshot => {
    const data = snapshot.val();
    if (data) { W.store.set('bottle_replies', data); try { initBottleReRender(); } catch(_) {} }
  });
})();

renderVouchers();
