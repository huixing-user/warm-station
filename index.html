<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<title>华仔の温暖小站 💕</title>
<style>
/* ===== CSS Reset & Variables ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink: #F9D0C3;
  --cream: #F5E6D3;
  --gold: #F0E6D8;
  --deep-pink: #E8A0B4;
  --brown: #8B6F5E;
  --dark: #4A3728;
  --white: #FFFBF7;
  --card-shadow: 0 4px 20px rgba(139, 111, 94, 0.12);
  --radius: 20px;
  --font-main: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
}

html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--font-main);
  background: linear-gradient(180deg, #FDF2EC 0%, var(--cream) 30%, #FDF2EC 60%, var(--pink) 100%);
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--dark);
  display: flex;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  overflow-x: hidden;
}

#app {
  width: 100%;
  max-width: 480px;
  padding: 0 20px 60px;
  position: relative;
  z-index: 1;
}

/* ===== Hero 区 ===== */
.hero {
  text-align: center;
  padding: 36px 20px 20px;
  position: relative;
}

.hero-hearts {
  font-size: 1.3rem;
  margin-bottom: 4px;
  letter-spacing: 6px;
  animation: floatHearts 3s ease-in-out infinite;
}

@keyframes floatHearts {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.hero-title {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--brown);
  letter-spacing: 2px;
  font-family: "Georgia", "STSong", "Songti SC", serif;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}

.hero-subtitle {
  font-size: 0.95rem;
  color: #A0897B;
  margin-top: 8px;
  font-style: italic;
  min-height: 24px;
  transition: opacity 0.5s;
}

/* ===== Section 通用样式 ===== */
.section {
  margin: 16px 0;
  padding: 24px 20px;
  background: rgba(255, 255, 255, 0.65);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
}

.section-title {
  text-align: center;
  font-size: 1.05rem;
  color: var(--brown);
  margin-bottom: 16px;
  font-weight: 600;
  letter-spacing: 1px;
}

/* ===== 弹窗/Modal 通用 ===== */
.modal-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal-overlay.active { display: flex; }

.modal-box {
  background: var(--white);
  border-radius: var(--radius);
  padding: 32px 24px;
  max-width: 340px; width: 90%;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  animation: modalIn 0.3s ease-out;
}

@keyframes modalIn {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-close {
  margin-top: 14px;
  padding: 10px 32px;
  border: none; border-radius: 25px;
  background: var(--deep-pink);
  color: white; font-size: 1rem;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.modal-close:active { transform: scale(0.95); }

/* ===== 粒子容器 ===== */
.particles-container {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 999;
}

/* ===== 飘落花瓣 ===== */
.petal {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  animation: petalFall linear forwards;
}

@keyframes petalFall {
  0%   { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0.7; }
  25%  { transform: translateY(25vh) rotate(90deg) translateX(35px); }
  50%  { transform: translateY(50vh) rotate(180deg) translateX(-25px); }
  75%  { transform: translateY(75vh) rotate(270deg) translateX(30px); opacity: 0.3; }
  100% { transform: translateY(105vh) rotate(360deg) translateX(-15px); opacity: 0; }
}

/* ===== Toast ===== */
.toast-msg {
  position: fixed; top: 18%; left: 50%; transform: translateX(-50%);
  background: rgba(74, 55, 40, 0.92); color: #FFFBF7; padding: 14px 28px;
  border-radius: 30px; font-size: 1rem; z-index: 2000;
  animation: toastIn 0.4s ease-out, toastOut 0.4s 2.2s ease-in forwards;
  pointer-events: none; text-align: center; max-width: 90vw;
  font-family: var(--font-main);
  letter-spacing: 0.5px;
}
@keyframes toastIn  { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

@keyframes particleUp {
  0%   { opacity: 1; transform: translateY(0) translateX(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) translateX(var(--dx, 20px)) scale(0.3); }
}

/* ===== 木鱼区 ===== */
.muyu-container {
  display: flex;
  justify-content: center;
  padding: 10px 0 6px;
}

.muyu-stand {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
}

.muyu-cushion {
  width: 160px; height: 26px;
  background: radial-gradient(ellipse at center, #D4A98A 0%, #9B6B4A 100%);
  border-radius: 50%;
  margin-bottom: -10px;
  z-index: 1;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.muyu-body {
  width: 130px; height: 130px;
  background: radial-gradient(circle at 45% 40%, #E0B878 0%, #C4854A 35%, #9B5F35 100%);
  border-radius: 50%;
  position: relative;
  box-shadow: 0 8px 30px rgba(139, 87, 48, 0.35), inset 0 -5px 10px rgba(0,0,0,0.15), inset 0 3px 6px rgba(255,255,255,0.1);
  transition: transform 0.1s ease-out;
  z-index: 2;
}

.muyu-body:active,
.muyu-body.pressed {
  transform: scale(0.91) translateY(8px);
  box-shadow: 0 2px 8px rgba(139, 87, 48, 0.3), inset 0 -2px 4px rgba(0,0,0,0.2);
  transition: transform 0.06s ease-out;
}

.muyu-groove {
  position: absolute;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  width: 54px; height: 6px;
  background: rgba(0,0,0,0.18);
  border-radius: 3px;
  box-shadow: 0 1px 2px rgba(255,255,255,0.15);
}

.muyu-fish {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 38px; height: 26px;
  background: rgba(0,0,0,0.07);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.muyu-fish::after {
  content: '🐟';
  font-size: 14px;
  opacity: 0.45;
}

.muyu-amount {
  text-align: center;
  font-size: 2.8rem;
  font-weight: 700;
  color: var(--brown);
  margin-top: 14px;
  font-family: "Georgia", "STSong", "Songti SC", serif;
  transition: transform 0.15s ease-out;
}

.muyu-amount.bump {
  animation: amountBump 0.35s ease-out;
}

@keyframes amountBump {
  0%   { transform: scale(1); }
  25%  { transform: scale(1.25); color: var(--deep-pink); }
  100% { transform: scale(1); }
}

.muyu-hint {
  text-align: center;
  font-size: 0.8rem;
  color: #C0A894;
  margin-top: 8px;
  letter-spacing: 0.5px;
}

/* ===== 转盘 ===== */
.wheel-wrapper {
  position: relative;
  width: 300px; height: 300px;
  margin: 0 auto;
}

.wheel-pointer {
  position: absolute;
  top: -12px; left: 50%;
  transform: translateX(-50%);
  font-size: 1.8rem;
  color: #E8486B;
  z-index: 10;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  animation: pointerBounce 1s ease-in-out infinite;
}

@keyframes pointerBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(5px); }
}

#wheelCanvas {
  display: block;
  width: 300px; height: 300px;
  border-radius: 50%;
}

.wheel-btn {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 66px; height: 66px;
  border-radius: 50%;
  border: 4px solid var(--white);
  background: linear-gradient(135deg, #FF6B8A, #E8486B);
  color: white;
  font-size: 1.35rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 18px rgba(232, 72, 107, 0.4);
  z-index: 5;
  transition: transform 0.1s;
  letter-spacing: 1px;
  -webkit-tap-highlight-color: transparent;
}

.wheel-btn:active {
  transform: translate(-50%, -50%) scale(0.88);
}

.wheel-btn:disabled {
  opacity: 0.55;
  pointer-events: none;
}

.wheel-counter {
  text-align: center;
  color: #B0A090;
  font-size: 0.85rem;
  margin-top: 12px;
}

/* ===== 照片墙 ===== */
.photo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.photo-card {
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 3px 14px rgba(139, 111, 94, 0.1);
  background: var(--white);
  transition: transform 0.2s;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.photo-card:active {
  transform: scale(0.95);
}

.photo-card img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
}

.photo-caption {
  padding: 8px 10px;
  font-size: 0.76rem;
  color: #A0897B;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#photoOverlay { cursor: pointer; }

/* ===== 暖心话语 ===== */
.quote-card {
  text-align: center;
  padding: 22px 18px;
  background: linear-gradient(135deg, #FFF7F2 0%, #FFEFE6 100%);
  border-radius: 14px;
  border: 1px solid rgba(232, 160, 180, 0.2);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

.quote-card:active {
  transform: scale(0.96);
}

.quote-text {
  font-size: 1.08rem;
  color: var(--brown);
  line-height: 1.8;
  font-family: "Georgia", "STSong", "Songti SC", serif;
  transition: opacity 0.3s;
}

.quote-text.fade { opacity: 0; }

.quote-hint {
  font-size: 0.72rem;
  color: #C8B4A4;
  margin-top: 10px;
}

/* ===== 烦恼漂流瓶 ===== */
.bottle-stage {
  position: relative;
  min-height: 260px;
}

/* 阶段0 — 便签 */
.note-wrapper {
  position: relative;
  background: linear-gradient(180deg, #FFFEF9 0%, #FFF9E8 50%, #FFFEF9 100%);
  border: 1px solid #E8D5B0;
  border-radius: 4px;
  padding: 20px 16px 36px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  margin-bottom: 14px;
}

.note-lines {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    180deg,
    transparent,
    transparent 27px,
    #E8D5B0 27px,
    #E8D5B0 28px
  );
  pointer-events: none;
  border-radius: 4px;
}

.note-textarea {
  position: relative; z-index: 1;
  width: 100%; min-height: 140px;
  background: transparent; border: none;
  font-size: 0.95rem; line-height: 28px;
  font-family: "Georgia", "STKaiti", "KaiTi", serif;
  color: #4A3728; resize: none; outline: none;
}

.note-textarea::placeholder { color: #C8B4A4; font-style: italic; }

.note-char-count {
  position: relative; z-index: 1;
  text-align: right; font-size: 0.72rem;
  color: #C8B4A4; margin-top: 4px;
}

.toss-btn {
  display: block; width: 100%;
  padding: 12px;
  border: none; border-radius: 25px;
  background: linear-gradient(135deg, #5B9BD5, #3B7DC4);
  color: white; font-size: 1rem; font-family: var(--font-main);
  cursor: pointer; transition: transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.toss-btn:active { transform: scale(0.97); }

.toss-btn-reset {
  background: linear-gradient(135deg, var(--deep-pink), #D4889A);
}

/* ===== 全新海洋动画舞台 ===== */
.bottle-anim-stage {
  display: none;
  position: relative; height: 380px;
  overflow: hidden;
  border-radius: 14px;
  background: linear-gradient(180deg,
    #87CEEB 0%,    /* 天空 */
    #B8E0F0 25%,
    #D4EEF7 40%,   /* 海天交接 */
    #5BADD5 50%,   /* 浅海 */
    #3D8FBF 70%,   /* 深海 */
    #1B5E8A 100%
  );
}

.bottle-anim-stage.running { display: block; }

/* 天空元素 */
.ocean-sky {
  position: absolute; top: 0; left: 0; right: 0; height: 55%;
  overflow: hidden;
}

.sun {
  position: absolute;
  top: 12px; right: 30px;
  width: 45px; height: 45px;
  background: radial-gradient(circle, #FFF3C4 0%, #FFD166 40%, #F0A030 100%);
  border-radius: 50%;
  box-shadow: 0 0 30px rgba(255, 209, 102, 0.6), 0 0 60px rgba(255, 180, 80, 0.3);
  animation: sunGlow 3s ease-in-out infinite;
}

@keyframes sunGlow {
  0%, 100% { box-shadow: 0 0 25px rgba(255, 209, 102, 0.5), 0 0 50px rgba(255, 180, 80, 0.25); }
  50% { box-shadow: 0 0 40px rgba(255, 209, 102, 0.8), 0 0 80px rgba(255, 180, 80, 0.4); }
}

.cloud {
  position: absolute;
  background: white;
  border-radius: 50px;
  opacity: 0.85;
}

.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}

.cloud1 {
  width: 70px; height: 22px;
  top: 25px; left: 15%;
  animation: cloudDrift1 20s linear infinite;
}
.cloud1::before { width: 30px; height: 30px; top: -15px; left: 15px; }
.cloud1::after { width: 22px; height: 22px; top: -10px; left: 40px; }

.cloud2 {
  width: 50px; height: 16px;
  top: 55px; left: 55%;
  animation: cloudDrift2 25s linear infinite;
}
.cloud2::before { width: 22px; height: 22px; top: -12px; left: 10px; }
.cloud2::after { width: 16px; height: 16px; top: -8px; left: 28px; }

.cloud3 {
  width: 60px; height: 18px;
  top: 70px; left: 80%;
  animation: cloudDrift1 18s linear infinite;
  animation-delay: -8s;
}
.cloud3::before { width: 26px; height: 26px; top: -14px; left: 12px; }
.cloud3::after { width: 18px; height: 18px; top: -9px; left: 35px; }

@keyframes cloudDrift1 {
  0% { transform: translateX(0); }
  100% { transform: translateX(-120px); }
}
@keyframes cloudDrift2 {
  0% { transform: translateX(0); }
  100% { transform: translateX(-80px); }
}

.birds {
  position: absolute;
  top: 40px; right: 120px;
  font-size: 0.8rem; letter-spacing: 6px;
  animation: birdFly 4s ease-in-out infinite;
}

@keyframes birdFly {
  0%, 100% { transform: translateX(0) translateY(0); }
  25% { transform: translateX(-20px) translateY(-8px); }
  50% { transform: translateX(-40px) translateY(0); }
  75% { transform: translateX(-60px) translateY(-5px); }
}

/* 海面 */
.ocean-surface {
  position: absolute; top: 44%; left: 0; right: 0; bottom: 0;
  overflow: hidden;
}

.wave {
  position: absolute;
  left: -10%; width: 120%;
  border-radius: 40%;
  opacity: 0.6;
}

.wave1 {
  top: 2px; height: 40px;
  background: rgba(100, 180, 220, 0.5);
  animation: waveRoll 4s ease-in-out infinite;
}
.wave2 {
  top: 14px; height: 45px;
  background: rgba(70, 150, 200, 0.45);
  animation: waveRoll 5s ease-in-out infinite reverse;
}
.wave3 {
  top: 28px; height: 50px;
  background: rgba(40, 120, 180, 0.4);
  animation: waveRoll 6s ease-in-out infinite;
}

@keyframes waveRoll {
  0%, 100% { transform: translateX(-3%) rotate(0deg); }
  25% { transform: translateX(3%) rotate(1deg); }
  50% { transform: translateX(-2%) rotate(0deg); }
  75% { transform: translateX(2%) rotate(-1deg); }
}

/* 卷纸动画 */
.paper-roll-stage {
  position: absolute;
  top: 15%; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

.anim-paper-new {
  width: 160px;
  background: linear-gradient(180deg, #FFFEF9 0%, #FFF9E8 100%);
  border: 1px solid #D4C5A0;
  border-radius: 3px;
  padding: 16px 14px;
  font-family: "STKaiti", "KaiTi", serif;
  font-size: 0.78rem;
  color: #4A3728;
  line-height: 1.7;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  transform-origin: bottom center;
  transition: none;
}

.anim-paper-new::after {
  content: '';
  position: absolute;
  bottom: 0; right: 0;
  border-width: 0 0 20px 20px;
  border-style: solid;
  border-color: transparent transparent #E8D5B0 transparent;
}

.anim-paper-new.rolling {
  animation: rollUp 2.8s cubic-bezier(0.22, 0.05, 0.36, 1) forwards;
}

@keyframes rollUp {
  0% {
    transform: scale(1);
    border-radius: 3px;
  }
  20% {
    transform: scale(0.95) rotate(-1deg);
  }
  35% {
    /* 下边缘开始卷 */
    clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 92% 90%, 85% 85%, 92% 88%, 85% 84%, 92% 87%, 0% 85%);
    transform: scale(0.9) rotate(1deg);
  }
  50% {
    clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 85% 78%, 70% 72%, 85% 76%, 70% 70%, 85% 75%, 0% 70%);
    transform: scale(0.85) rotate(-1.5deg);
    border-radius: 8px;
  }
  65% {
    clip-path: polygon(0% 0%, 100% 0%, 100% 50%, 80% 58%, 65% 52%, 80% 56%, 65% 50%, 0% 50%);
    transform: scale(0.78) rotate(2deg);
    border-radius: 20px;
  }
  80% {
    clip-path: polygon(0% 0%, 100% 0%, 100% 30%, 50% 35%, 0% 30%);
    transform: scale(0.7) rotate(-1deg);
    border-radius: 25px;
  }
  95% {
    clip-path: polygon(0% 0%, 100% 0%, 100% 12%, 50% 14%, 0% 12%);
    transform: scale(0.6);
    border-radius: 30px;
    opacity: 0.7;
  }
  100% {
    clip-path: polygon(0% 0%, 100% 0%, 100% 8%, 50% 10%, 0% 8%);
    transform: scale(0.5);
    border-radius: 30px;
    opacity: 0;
  }
}

/* 瓶子 */
.bottle-sail {
  position: absolute;
  bottom: 12%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 3.5rem;
  z-index: 8;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,0.2));
  transition: none;
}

.bottle-sail.nod {
  animation: bottleNod 0.5s ease-out;
}

@keyframes bottleNod {
  0% { transform: translateX(-50%) scale(1); }
  40% { transform: translateX(-50%) scale(1.18) rotate(5deg); }
  70% { transform: translateX(-50%) scale(1.05) rotate(-3deg); }
  100% { transform: translateX(-50%) scale(1.08); }
}

.bottle-sail.sailing {
  animation: sailAway 3s ease-in-out forwards;
}

@keyframes sailAway {
  0% {
    transform: translate(-50%, 0) rotate(0deg);
    opacity: 1;
  }
  10% {
    transform: translate(-45%, -5px) rotate(3deg);
    opacity: 1;
  }
  25% {
    transform: translate(-55%, -15px) rotate(-5deg);
    opacity: 0.9;
  }
  40% {
    transform: translate(-40%, -25px) rotate(7deg);
    opacity: 0.75;
  }
  60% {
    transform: translate(20px, -40px) rotate(-8deg);
    opacity: 0.5;
  }
  80% {
    transform: translate(120px, -60px) rotate(12deg);
    opacity: 0.2;
  }
  100% {
    transform: translate(350px, -90px) rotate(20deg);
    opacity: 0;
  }
}

/* 阶段2 — 完成 */
.bottle-done {
  display: none;
  text-align: center;
  padding: 30px 10px;
}

.bottle-done.show { display: block; }

.done-icon { font-size: 3.5rem; margin-bottom: 12px; animation: floatHearts 3s ease-in-out infinite; }
.done-text { font-size: 1.15rem; color: var(--brown); font-weight: 600; margin-bottom: 6px; }
.done-sub { font-size: 0.85rem; color: #A0897B; margin-bottom: 20px; }

/* 历史记录 */
.bottle-history {
  margin-top: 18px;
  border-top: 1px solid #F0E6D8;
  padding-top: 14px;
}

.history-title {

<script>
// ======================================================================
//  华仔の温暖小站 — 核心逻辑
// ======================================================================

const WA = {
  PASSWORD: 'HhxloveCwh1314!',

  // ---- localStorage 工具 ----
  store: {
    get(key, fallback) {
      try { const v = localStorage.getItem('warm_' + key); return v !== null ? JSON.parse(v) : fallback; }
      catch(e) { return fallback; }
    },
    set(key, val) {
      try { localStorage.setItem('warm_' + key, JSON.stringify(val)); } catch(e) {}
    }
  },

  // ---- 初始化数据 ----
  init() {
    if (this.store.get('muyu_count', null) === null)  this.store.set('muyu_count', 0);
    if (this.store.get('muyu_total', null) === null)  this.store.set('muyu_total', 0);
    if (this.store.get('wheel_count', null) === null) this.store.set('wheel_count', 0);
    if (this.store.get('wheel_records', null) === null) this.store.set('wheel_records', []);
    if (this.store.get('wheel_milestones', null) === null) {
      this.store.set('wheel_milestones', { m52: false, m520: false, m1314: false });
    }
  },

  // ---- 工具函数 ----
  fmtMoney(count) { return (count * 0.1).toFixed(1); },

  spawnParticles(x, y, text, count) {
    const container = document.getElementById('particlesContainer');
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.textContent = text;
      const dx = (Math.random() - 0.5) * 70;
      p.style.cssText = `
        position:fixed; left:${x}px; top:${y}px;
        font-size:${14 + Math.random() * 12}px;
        pointer-events:none; z-index:999;
        --dx:${dx}px;
        animation: particleUp ${0.5 + Math.random() * 0.5}s ease-out forwards;
      `;
      container.appendChild(p);
      setTimeout(() => p.remove(), 1100);
    }
  },

  showToast(msg) {
    const existing = document.querySelector('.toast-msg');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2700);
  },

  // ---- 飘落花瓣 ----
  startPetals() {
    const petals = ['🌸', '💮', '🌷', '🍂', '✨', '🌺'];
    const spawn = () => {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = petals[Math.floor(Math.random() * petals.length)];
      p.style.left = Math.random() * 100 + '%';
      p.style.fontSize = (14 + Math.random() * 18) + 'px';
      p.style.animationDuration = (10 + Math.random() * 14) + 's';
      p.style.animationDelay = Math.random() * 3 + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 18000);
    };
    for (let i = 0; i < 10; i++) setTimeout(spawn, i * 700);
    setInterval(spawn, 3500);
  }
};

// ======================================================================
//  木鱼模块
// ======================================================================
WA.muyu = {
  audioCtx: null,

  init() {
    this.count = WA.store.get('muyu_count', 0);
    this.total = WA.store.get('muyu_total', 0);
    this.body = document.getElementById('muyuBody');
    this.amountEl = document.getElementById('muyuAmount');
    this.updateDisplay();
    this.bindEvents();
  },

  bindEvents() {
    const stand = document.getElementById('muyuStand');
    stand.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      this.body.classList.add('pressed');
      this.hit(e);
    });
    stand.addEventListener('pointerup', () => this.body.classList.remove('pressed'));
    stand.addEventListener('pointerleave', () => this.body.classList.remove('pressed'));
    stand.addEventListener('pointercancel', () => this.body.classList.remove('pressed'));
  },

  hit(e) {
    this.count++;
    this.total = parseFloat((this.total + 0.1).toFixed(1));
    WA.store.set('muyu_count', this.count);
    WA.store.set('muyu_total', this.total);

    this.playSound();
    if (navigator.vibrate) navigator.vibrate(15);

    this.updateDisplay();
    this.amountEl.classList.remove('bump');
    void this.amountEl.offsetWidth;
    this.amountEl.classList.add('bump');

    const rect = this.body.getBoundingClientRect();
    WA.spawnParticles(rect.left + rect.width / 2, rect.top + 10, '+0.1', 3);
    WA.spawnParticles(rect.left + rect.width * 0.7, rect.top + 5, '💛', 2);

    this.checkEasterEgg();
  },

  playSound() {
    try {
      if (!this.audioCtx) {
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      const ctx = this.audioCtx;
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(90, now + 0.1);

      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.22);

      osc.start(now);
      osc.stop(now + 0.22);
    } catch(_) {}
  },

  updateDisplay() {
    this.amountEl.textContent = '¥' + this.total.toFixed(1);
  },

  checkEasterEgg() {
    const special = {
      '5.2': '💝 5.20！我爱你，不止今天',
      '13.1': '💖 13.14！一生一世只爱你',
      '52.0': '💗 52.0！吾爱零，爱你永无止境',
      '99.9': '💕 99.9！长长久久，永远在一起',
      '131.4': '💘 131.4！一生一世，只属于你'
    };
    const t = this.total.toFixed(1);
    if (special[t]) {
      setTimeout(() => {
        WA.showToast(special[t]);
        WA.spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '🎉', 15);
      }, 350);
    }
  }
};

// ======================================================================
//  转盘模块
// ======================================================================
WA.wheel = {
  prizes: [
    { name: '谢谢惠顾',       icon: '😅', prob: 0.42, level: 0 },
    { name: '华仔亲亲',       icon: '😘', prob: 0.25, level: 0 },
    { name: '爱的抱抱',       icon: '🫂', prob: 0.16, level: 0 },
    { name: '请喝奶茶',       icon: '🧋', prob: 0.09, level: 1 },
    { name: '请吃饭',         icon: '🍽️', prob: 0.04, level: 1 },
    { name: '买束花花',       icon: '💐', prob: 0.025, level: 2 },
    { name: '买Jellycat',    icon: '🧸', prob: 0.01, level: 2 },
    { name: '买包包/戒指',    icon: '💍', prob: 0.005, level: 3 },
  ],
  colors: ['#FFE6DA', '#FFF7F0', '#FFE0D0', '#FFFBF7', '#FFECD8', '#FFF4EC', '#FFE2CE', '#FFFAF6'],
  spinning: false,
  currentAngle: 0,

  init() {
    this.count = WA.store.get('wheel_count', 0);
    this.records = WA.store.get('wheel_records', []);
    this.milestones = WA.store.get('wheel_milestones', { m52: false, m520: false, m1314: false });
    this.canvas = document.getElementById('wheelCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.btn = document.getElementById('wheelBtn');
    this.counterEl = document.getElementById('wheelCounter');
    this.draw();
    this.updateCounter();
    this.bindEvents();
  },

  bindEvents() {
    this.btn.addEventListener('click', () => this.spin());
    document.getElementById('resultCloseBtn').addEventListener('click', () => {
      document.getElementById('resultOverlay').classList.remove('active');
    });
  },

  draw(rotAngle) {
    const ctx = this.ctx;
    const cx = 150, cy = 150, r = 140;
    const sliceAngle = (2 * Math.PI) / this.prizes.length;
    const angle = rotAngle || this.currentAngle;

    ctx.clearRect(0, 0, 300, 300);

    // 阴影圈
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r + 5, 0, 2 * Math.PI);
    ctx.shadowColor = 'rgba(139,111,94,0.18)';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#FFFBF7';
    ctx.fill();
    ctx.restore();

    for (let i = 0; i < this.prizes.length; i++) {
      const start = i * sliceAngle + angle;
      const end = start + sliceAngle;

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end);
      ctx.closePath();
      ctx.fillStyle = this.colors[i];
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(start + sliceAngle / 2);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#4A3728';
      ctx.font = 'bold 16px -apple-system, "PingFang SC", sans-serif';
      ctx.fillText(this.prizes[i].icon, r * 0.6, 3);
      ctx.font = '11px -apple-system, "PingFang SC", sans-serif';
      ctx.fillText(this.prizes[i].name, r * 0.6, 21);
      ctx.restore();
    }

    // 中心装饰
    ctx.beginPath();
    ctx.arc(cx, cy, 38, 0, 2 * Math.PI);
    const cg = ctx.createRadialGradient(cx, cy, 4, cx, cy, 38);
    cg.addColorStop(0, '#FFFBF7');
    cg.addColorStop(1, '#F0E6D8');
    ctx.fillStyle = cg;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 4;
    ctx.stroke();
  },

  getAdjustedProbs() {
    const probs = this.prizes.map(p => ({ ...p }));
    const c = this.count;
    let surplus = 0;

    // 里程碑 52: 请吃饭 (index 4)
    if (!this.milestones.m52 && c >= 48) {
      const boost = Math.min(0.35, 0.08 + (c - 48) * 0.06);
      surplus += boost - probs[4].prob;
      probs[4].prob = boost;
    }

    // 里程碑 520: Jellycat (index 6)
    if (!this.milestones.m520 && c >= 505) {
      const boost = Math.min(0.28, 0.02 + (c - 505) * 0.018);
      surplus += boost - probs[6].prob;
      probs[6].prob = boost;
    }

    // 里程碑 1314: 包包/戒指 (index 7)
    if (!this.milestones.m1314 && c >= 1295) {
      const boost = Math.min(0.22, 0.01 + (c - 1295) * 0.012);
      surplus += boost - probs[7].prob;
      probs[7].prob = boost;
    }

    // 分摊 surplus 到低奖级，优先从谢谢惠顾扣
    if (surplus > 0) {
      const drain = [0, 1, 2, 3]; // 从这些奖级扣概率
      let remaining = surplus;
      for (const idx of drain) {
        if (remaining <= 0) break;
        const take = Math.min(probs[idx].prob - 0.03, remaining);
        if (take > 0) { probs[idx].prob -= take; remaining -= take; }
      }
    }

    return probs;
  },

  pickPrize() {
    const probs = this.getAdjustedProbs();
    let r = Math.random();
    for (let i = 0; i < probs.length; i++) {
      r -= probs[i].prob;
      if (r <= 0) return { index: i, prize: probs[i] };
    }
    return { index: 0, prize: probs[0] };
  },

  spin() {
    if (this.spinning) return;
    this.spinning = true;
    this.btn.disabled = true;
    this.count++;
    WA.store.set('wheel_count', this.count);

    const { index, prize } = this.pickPrize();
    const sliceAngle = 360 / this.prizes.length;
    const targetSliceCenter = index * sliceAngle + sliceAngle / 2;
    const extraSpins = 4 + Math.floor(Math.random() * 3);
    const totalSpinDeg = extraSpins * 360 + ((270 - targetSliceCenter) - ((this.currentAngle % 360) + 360) % 360);
    const targetAngle = this.currentAngle + totalSpinDeg;

    const startAngle = this.currentAngle;
    const duration = 3800 + Math.random() * 1400;
    const startTime = performance.now();

    const animate = (now) => {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
      const cur = startAngle + totalSpinDeg * eased;
      this.currentAngle = cur;
      this.draw(cur * Math.PI / 180);
      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        this.currentAngle = targetAngle;
        this.draw(targetAngle * Math.PI / 180);
        this.onResult(prize, index);
      }
    };

    requestAnimationFrame(animate);
    this.updateCounter();
  },

  onResult(prize, index) {
    const record = {
      time: new Date().toISOString(),
      prize: prize.name,
      icon: prize.icon,
      level: prize.level
    };
    this.records.push(record);
    WA.store.set('wheel_records', this.records);

    // 里程碑检测
    if (prize.level === 1 && !this.milestones.m52 && this.count >= 48) {
      this.milestones.m52 = true;
      WA.store.set('wheel_milestones', this.milestones);
    }
    if (prize.level === 2 && !this.milestones.m520 && this.count >= 505) {
      this.milestones.m520 = true;
      WA.store.set('wheel_milestones', this.milestones);
    }
    if (prize.level === 3 && !this.milestones.m1314 && this.count >= 1295) {
      this.milestones.m1314 = true;
      WA.store.set('wheel_milestones', this.milestones);
    }

    this.showResultModal(prize);

    if (prize.level >= 2) {
      setTimeout(() => {
        WA.spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '🎉', 20);
        WA.spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '💖', 12);
      }, 400);
    }

    setTimeout(() => {
      if (!document.getElementById('resultOverlay').classList.contains('active')) {
        this.spinning = false;
        this.btn.disabled = false;
      }
    }, 400);
  },

  showResultModal(prize) {
    const content = document.getElementById('resultContent');
    let msg = '';
    if (prize.level >= 3) msg = '💎 天哪！超级大奖！！';
    else if (prize.level >= 2) msg = '🎊 恭喜！大奖来啦！';
    else if (prize.level === 1) msg = '运气不错哦～';
    else msg = '下次会更好～';

    content.innerHTML = `
      <div style="font-size:3.5rem;margin-bottom:8px">${prize.icon}</div>
      <div style="font-size:1.5rem;font-weight:700;color:#4A3728;margin-bottom:4px">${prize.name}</div>
      <div style="color:#A0897B;font-size:0.88rem;margin-top:6px">${msg}</div>
    `;
    document.getElementById('resultOverlay').classList.add('active');

    // 关闭弹窗后恢复按钮
    const closeBtn = document.getElementById('resultCloseBtn');
    const restore = () => {
      this.spinning = false;
      this.btn.disabled = false;
      closeBtn.removeEventListener('click', restore);
    };
    closeBtn.addEventListener('click', restore);
  },

  updateCounter() {
    this.counterEl.textContent = '已转 ' + this.count + ' 次';
  }
};

WA.bottle = {
  init() {
    this.noteWrapper = document.getElementById('noteWrapper');
    this.worryInput = document.getElementById('worryInput');
    this.charCount = document.getElementById('charCount');
    this.tossBtn = document.getElementById('tossBtn');
    this.animStage = document.getElementById('bottleAnimStage');
    this.animPaperNew = document.getElementById('animPaperNew');
    this.animPaperInner = document.getElementById('animPaperInner');
    this.bottleSail = document.getElementById('bottleSail');
    this.bottleDone = document.getElementById('bottleDone');
    this.resetBtn = document.getElementById('resetBtn');
    this.historyList = document.getElementById('historyList');

    // 字数统计
    this.worryInput.addEventListener('input', () => {
      this.charCount.textContent = this.worryInput.value.length;
    });

    // 提交按钮
    this.tossBtn.addEventListener('click', () => {
      const text = this.worryInput.value.trim();
      if (!text) { WA.showToast('先写点什么吧～ ✍️'); return; }
      this.startAnimation(text);
    });

    // 重置按钮
    this.resetBtn.addEventListener('click', () => this.reset());

    // 加载历史记录
    this.renderHistory();
  },

  startAnimation(text) {
    // 隐藏便签和按钮
    this.noteWrapper.style.display = 'none';
    this.tossBtn.style.display = 'none';
    this.bottleDone.classList.remove('show');
    this.bottleDone.style.display = 'none';

    // 显示动画舞台
    this.animStage.classList.add('running');

    // 设置纸条内容
    const shortText = text.length > 100 ? text.slice(0, 100) + '…' : text;
    this.animPaperInner.textContent = shortText;
    this.animPaperNew.classList.remove('rolling');
    this.animPaperNew.style.clipPath = '';
    this.animPaperNew.style.opacity = '1';
    this.animPaperNew.style.transform = 'scale(1)';
    this.animPaperNew.style.borderRadius = '3px';
    this.bottleSail.classList.remove('nod', 'sailing');
    this.bottleSail.style.opacity = '1';
    this.bottleSail.style.transform = 'translateX(-50%)';

    const section = document.querySelector('.bottle-section');
    const rect = section.getBoundingClientRect();

    const cx = rect.left + rect.width / 2;
    const cy = rect.top + 180;

    // ====== 全新动画时间线 ======

    // 阶段1: 纸条慢慢卷起来（2.8秒）
    setTimeout(() => {
      this.animPaperNew.classList.add('rolling');
      this.playCrinkle();
    }, 300);

    // 阶段2: 纸条卷完消失后，瓶子接住（3.5s）
    setTimeout(() => {
      this.bottleSail.classList.add('nod');
      WA.spawnParticles(cx, cy + 60, '✨', 5);
    }, 3500);

    // 阶段3: 瓶子开始漂向大海（4.3s）
    setTimeout(() => {
      this.bottleSail.classList.add('sailing');
      WA.spawnParticles(cx + 60, cy + 80, '💧', 10);
    }, 4300);

    // 阶段4: 显示完成，保存历史（7.5s）
    setTimeout(() => {
      this.showDoneState(text);
      this.saveHistory(text);
      this.renderHistory();
    }, 7500);

    // 发送邮件通知
    this.sendEmail(text);

    // 清空输入框状态（下次打开不恢复）
    WA.store.set('bottle_last', '');
    WA.store.set('bottle_done', false);
  },

  saveHistory(text) {
    const history = WA.store.get('bottle_history', []);
    history.push({
      text: text,
      time: new Date().toISOString(),
    });
    // 最多保留 50 条
    if (history.length > 50) history.shift();
    WA.store.set('bottle_history', history);
  },

  renderHistory() {
    const history = WA.store.get('bottle_history', []);
    if (history.length === 0) {
      this.historyList.innerHTML = '<div style="color:#C8B4A4;text-align:center;font-size:0.85rem;">还没有丢过烦恼哦～</div>';
      return;
    }
    this.historyList.innerHTML = history.slice().reverse().map(h => {
      const d = new Date(h.time);
      const dateStr = d.getFullYear() + '.' + (d.getMonth() + 1) + '.' + d.getDate() + ' '
        + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
      return `
        <div class="history-item">
          <div class="history-item-time">📅 ${dateStr}</div>
          <div class="history-item-text">${this.escapeHtml(h.text)}</div>
        </div>
      `;
    }).join('');
  },

  escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  },

  sendEmail(text) {
    try {
      emailjs.send('service_5kb3qjr', 'template_qswaff3', {
        message: text,
        time: new Date().toLocaleString('zh-CN'),
        from: '温暖小站漂流瓶',
      });
    } catch(e) {}
  },

  showDoneState(text) {
    this.noteWrapper.style.display = 'none';
    this.tossBtn.style.display = 'none';
    this.animStage.classList.remove('running');
    this.bottleDone.classList.add('show');
    this.bottleDone.style.display = 'block';
    WA.store.set('bottle_done', true);
  },

  reset() {
    this.noteWrapper.style.display = 'block';
    this.tossBtn.style.display = 'block';
    this.animStage.classList.remove('running');
    this.bottleDone.classList.remove('show');
    this.bottleDone.style.display = 'none';
    this.worryInput.value = '';
    this.charCount.textContent = '0';
    this.animPaperNew.classList.remove('rolling');
    this.animPaperNew.style.clipPath = '';
    this.animPaperNew.style.opacity = '1';
    this.animPaperNew.style.transform = 'scale(1)';
    this.bottleSail.classList.remove('nod', 'sailing');
    this.bottleSail.style.opacity = '1';
    WA.store.set('bottle_last', '');
    WA.store.set('bottle_done', false);
  },

  playCrinkle() {
    try {
      const ctx = WA.muyu.audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      const bufferSize = ctx.sampleRate * 0.3;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.05));
      }
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.06, now);
      source.connect(gain);
      gain.connect(ctx.destination);
      source.start(now);
    } catch(_) {}
  }
};

      pressTimer = setTimeout(() => {
        this.pwdInput.value = '';
        this.pwdOverlay.classList.add('active');
        this.pwdInput.focus();
      }, 3000);
    };
    const cancelPress = () => clearTimeout(pressTimer);

    title.addEventListener('pointerdown', startPress);
    title.addEventListener('pointerup', cancelPress);
    title.addEventListener('pointerleave', cancelPress);
    title.addEventListener('pointercancel', cancelPress);
    // 移动端用手指移动时取消（防止误触发）
    title.addEventListener('touchmove', cancelPress);

    document.getElementById('pwdConfirm').addEventListener('click', () => this.verify());
    document.getElementById('pwdCancel').addEventListener('click', () => {
      this.pwdOverlay.classList.remove('active');
    });
    this.pwdInput.addEventListener('keydown', (e) => {

    });
    document.getElementById('adminClose').addEventListener('click', () => {
      this.overlay.classList.remove('active');
    });

  verify() {
    if (this.pwdInput.value === WA.PASSWORD) {
